name: Build pjsip for .NET MAUI 
on:
  pull_request:
    types: [opened, synchronize]
  push:
    tags:
      - 'v*' 
  workflow_dispatch:
   
permissions:
  contents: write

env:
  BCG729_PATH:  ${{ github.workspace }}/lib/bcg729
  OPENH264_PATH: ${{ github.workspace }}/lib/openh264
  OPENSSL_PATH: ${{ github.workspace }}/lib/openssl
  OPUS_PATH: ${{ github.workspace }}/lib/opus
  PJSIP_PATH: ${{ github.workspace }}/lib/pjsip
  MIN_IOS_VERSION: 15.0
  DOTNET_NOLOGO: true                     # Disable the .NET logo
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true # Disable the .NET first time experience
  DOTNET_CLI_TELEMETRY_OPTOUT: true       # Disable sending .NET CLI telemetry
  PJSIP_BUILD_OUT_PATH: ${{ github.workspace }}/outputs/pjsip-build-output
  SWIG_BUILD_OUT_PATH: ${{ github.workspace }}/outputs/swig-build-output    
  PJSIP_VERSION: 2.16
  OPENSSL_VERSION: OpenSSL_1_1_1s
  OPENH264_VERSION: v2.3.0
  OPUS_VERSION: v1.4
  BCG729_VERSION: 1.1.1
  MIN_MACOSX_VERSION: 15.0
  SDKVERSION: 26.2
  BUILD_TYPE: Release
  ROOT_DIR: ${{ github.workspace }}
  ARTIFACTS_DIR: ${{ github.workspace }}\artifacts
  LOGS_DIR: ${{ github.workspace }}\logs
  INSTALL_DIR: ${{ github.workspace }}\install

jobs:
  bcg729-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Cache BCG729 Built SDK
        id: cache-libs
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/bcg729-output
          key: bcg729-${{ env.BCG729_VERSION }}-android
    
      - name: Create Output Directory
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: mkdir -p ${{ github.workspace }}/bcg729-output

      - name: Set Permissions for Output Directory
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: chmod -R 777 ${{ github.workspace }}/bcg729-output

      - name: Build Docker Image
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          docker build -t bcg729-builder ${{ github.workspace }}/res/docker/bcg729
        
      - name: Run Docker Container 
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          docker run --name bcg729-build bcg729-builder
          
      - name: Extract Artifacts from Container
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          docker cp bcg729-build:/root/outputs/libs ${{ github.workspace }}/bcg729-output
 
      - name: Upload bcg729 Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bcg729-android
          path: ./bcg729-output 
          overwrite: true
      
  bcg729-ios:
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64, arm64s]
        include: 
          - lib_name: bcg729
          - arch: x86_64
            platform: iossimulator
            os_platform: iPhoneSimulator
          - arch: arm64s
            platform: iossimulator
            os_platform: iPhoneSimulator
          - arch: arm64
            platform: ios
            os_platform: iPhoneOS
    runs-on: macos-15
    name: bcg729-ios 
    permissions:
      contents: write
    steps:       
    - uses: actions/checkout@v6
      with:
        submodules: true
       
    - name: Cache BCG729 Built SDK
      id: cache-libs
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/${{ matrix.os_platform }}${{ env.MIN_IOS_VERSION }}-${{ matrix.arch }}.sdk
        key: ${{ matrix.lib_name }}-${{ env.BCG729_VERSION }}-${{ matrix.platform }}-${{ env.SDKVERSION }}-${{ matrix.arch }}
    
    - name: Setup Xcode 26.4
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.3'
 
    - name: Install deps
      if: steps.cache-libs.outputs.cache-hit != 'true'
      run: |
        brew install nasm autoconf automake libtool
      shell: sh

    - name: Build bcg729 for iOS
      id: build
      if: steps.cache-libs.outputs.cache-hit != 'true'
      run: |
        echo "Building BCG729 for iOS"
        xcode_dev_path=$(xcode-select -print-path)
        cd ${{ env.BCG729_PATH }}

        echo "-- Compiling for ${{ matrix.arch }}"

        case "${{ matrix.arch }}" in
          x86_64)
            os_platform="iPhoneSimulator"
            cmake_arch="x86_64"
            ;;
          arm64)
            os_platform="iPhoneOS"
            cmake_arch="arm64"
            ;;
          arm64s)
            os_platform="iPhoneSimulator"
            cmake_arch="arm64"
            ;;
        esac

        sdk_path="${xcode_dev_path}/Platforms/${{ matrix.os_platform }}.platform/Developer/SDKs/${{ matrix.os_platform }}.sdk"

        build_dir="${{ github.workspace }}/${{ matrix.os_platform }}${{ env.MIN_IOS_VERSION }}-${{ matrix.arch }}.sdk"
        rm -rf "$build_dir" CMakeFiles CMakeCache.txt

        mkdir -p "$build_dir"

        cmake \
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
          -DCMAKE_OSX_ARCHITECTURES=$cmake_arch \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$build_dir" \
          -DCMAKE_SKIP_INSTALL_RPATH=ON \
          -DCMAKE_MAKE_PROGRAM:PATH=$(which make) \
          -DCMAKE_C_COMPILER=$(which clang) \
          -DCMAKE_OSX_SYSROOT="$sdk_path" \
          .

        make || exit 1
        make install


    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: bcg729-${{ matrix.arch }}
        path: ${{ github.workspace }}/${{ matrix.os_platform }}${{ env.MIN_IOS_VERSION }}-${{ matrix.arch }}.sdk
        overwrite: true
      env:
        SDKVERSION: ${{ matrix.arch == 'arm64' && '$(xcrun -sdk iphoneos --show-sdk-version)' || '$(xcrun -sdk iphonesimulator --show-sdk-version)' }}
 
  bcg729-mac:
    runs-on: macos-26
    name: bcg729-mac
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        include:
          - platform: MacOSX
          - lib_name: bcg729
          - sdk: macosx
    steps:
      
      - name: Cache BCG729 Built SDK
        id: cache-libs
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          key: ${{ matrix.lib_name }}-${{ env.BCG729_VERSION }}-${{ matrix.platform }}-${{ env.SDKVERSION }}-${{ matrix.arch }}

      - name: Clone BCG729
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          git clone --branch $BCG729_VERSION https://github.com/BelledonneCommunications/bcg729.git 

      - name: Setup Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'
  
      - name: Install deps
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          brew install autoconf automake cmake libtool llvm nasm 
        shell: sh

      - name: Build BCG729 for MacCatalyst
        if: steps.cache-libs.outputs.cache-hit != 'true'
        working-directory: bcg729
        shell: sh
        run: |
          echo "-- Building BCG729 for iOS"
          echo "-- Building arch ${{ matrix.arch }}"
          xcode_dev_path=$(xcode-select -print-path)
          os_platform="MacOSX"
          sdk_path="${xcode_dev_path}/Platforms/${os_platform}.platform/Developer/SDKs/${os_platform}.sdk"
          mkdir -p ../logs
          mkdir -p ../../install

          cmake .                                                               \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5                                  \
            -DCMAKE_BUILD_TYPE=Release                                          \
            -DCMAKE_SYSTEM_NAME=Darwin                                          \
            -DCMAKE_C_COMPILER=$(which clang)                                   \
            -DCMAKE_MAKE_PROGRAM:PATH=$(which make)                             \
            -DCMAKE_SKIP_INSTALL_RPATH=ON                                       \
            -DCMAKE_C_FLAGS="-target ${{ matrix.arch }}-apple-ios15.0-macabi"   \
            -DBUILD_SHARED_LIBS=OFF                                             \
            -DENABLE_SHARED=OFF                                                 \
            -DENABLE_STATIC=ON                                                  \
            -DCMAKE_INSTALL_PREFIX=${{ env.BUILT_SDK_PATH }}                    \
            -DCMAKE_OSX_SYSROOT="$sdk_path"                                     \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}                        \
            > ../logs/${{ matrix.lib_name }}-config-${{ matrix.arch }}.log 

          make -j$(sysctl -n hw.logicalcpu) \
            > ../logs/${{ matrix.lib_name }}-build-${{ matrix.arch }}.log 

          make install \
            > ../logs/${{ matrix.lib_name }}-install-${{ matrix.arch }}.log
        env:
          SDK_SUFFIX: ${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          BUILT_SDK_PATH: ${{ github.workspace }}/${{ env.SDK_SUFFIX }}

      - uses: actions/upload-artifact@v7
        name: Upload error logs
        if: failure()
        with:
          name: ${{ matrix.lib_name }}-${{ env.SDK_SUFFIX }}-logs
          path: |
            logs/*.log        
        env:
          SDK_SUFFIX: ${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
        
      - uses: actions/upload-artifact@v7
        name: Upload BCG ${{ matrix.arch }} artifact 
        with:
          name: ${{ matrix.lib_name }}-${{ env.SDK_SUFFIX}}
          path: |
            ${{ env.BUILT_SDK_PATH }}
            logs/*.log
        env:
          SDK_SUFFIX: ${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          BUILT_SDK_PATH: ${{ github.workspace }}/${{ env.SDK_SUFFIX }}

  bcg729-win:
    name: bcg729-win
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Cache BCG729 Built SDK
        id: cache-libs
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/deps/bcg729
          key: bcg729-${{ env.BCG729_VERSION }}-win-x64
    
      - name: Setup MSVC
        if: steps.cache-libs.outputs.cache-hit != 'true'
        uses: ilammy/msvc-dev-cmd@v1
        with:
            arch: x64

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Configure MSVC
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: cmd
        run: |
            call "E:\Program Files\Microsoft Visual Studio Community 2026\Common7\Tools\VsDevCmd.bat" -arch=x64
            echo Visual Studio environment loaded
            where cl
            where msbuild

      - name: Create directories
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            New-Item -ItemType Directory -Force -Path "${env:LOGS_DIR}" | Out-Null
            New-Item -ItemType Directory -Force -Path "${env:INSTALL_DIR}" | Out-Null

      - name: Clone BCG729
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            git clone `
            --branch "${env:BCG729_VERSION}" `
            --depth 1 `
            https://github.com/BelledonneCommunications/bcg729.git `
            bcg729

      - name: Build bcg729
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: cmd
        working-directory: bcg729
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64

          cmake -S . ^
                -B build ^
                -G "Visual Studio 17 2022" ^
                -A x64 ^
                -DBUILD_SHARED_LIBS=OFF ^
                -DENABLE_UNIT_TESTS=OFF ^
                -DCMAKE_POLICY_VERSION_MINIMUM='3.5' ^
                -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL ^
                -DCMAKE_INSTALL_PREFIX=%CD%\..\deps\bcg729

          cmake --build build --config Release --target INSTALL

          echo ===== VERIFY CRT =====
          dumpbin /directives ..\deps\bcg729\lib\bcg729.lib | findstr DEFAULTLIB
            

      - name: Normalize artifacts
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            $target = "${env:INSTALL_DIR}\bcg729\x64"

            New-Item -ItemType Directory -Force -Path "$target\lib" | Out-Null
            New-Item -ItemType Directory -Force -Path "$target\include\bcg729" | Out-Null

            Get-ChildItem bcg729/build -Recurse -Filter *.lib |
            Copy-Item -Destination "$target\lib" -Force

            Get-ChildItem bcg729/include -Recurse -Filter *.h |
            Copy-Item -Destination "$target\include\bcg729" -Force

      - name: List generated files
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            Get-ChildItem "${env:INSTALL_DIR}\bcg729" -Recurse
 
      - name: Upload BCG729 artifacts 
        uses: actions/upload-artifact@v4
        with:
            name: bcg729-win-x64
            path: deps/bcg729/**/*
            if-no-files-found: warn
          
  openh264-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
  
      - name: Cache H264 Built SDK
        id: cache-libs
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/libopenh264-output
          key: h264-${{ env.OPENH264_VERSION }}-android
    
      - name: Create Output Directory
        run: mkdir -p ${{ github.workspace }}/libopenh264-output
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Set Permissions for Output Directory
        run: chmod -R 777 ${{ github.workspace }}/libopenh264-output
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Build Docker Image
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          docker build -t openh264-builder ${{ github.workspace }}/res/docker/openh264

      - name: Run Docker Container 
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: | 
          docker run --name openh264-build openh264-builder
          
      - name: Extract Artifacts from Container
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: | 
          docker cp openh264-build:/root/outputs/libs ${{ github.workspace }}/libopenh264-output
           
      - name: Upload OpenH264 Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openh264-android
          path: ${{ github.workspace }}/libopenh264-output
          overwrite: true
   
  openh264-ios:
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64, arm64s]
        include:
          - arch: arm64
            resolved_arch: arm64
            platform: iPhoneOS
          - arch: arm64s
            resolved_arch: arm64
            platform: iPhoneSimulator
          - arch: x86_64
            resolved_arch: x86_64
            platform: iPhoneSimulator
    runs-on: macos-15
    name: openh264-ios
    permissions:
      contents: write
    steps:
        
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: true

    - name: Cache H264 Built SDK
      id: cache-libs
      uses: actions/cache@v5
      with:
        path: ${{ env.OPENH264_PATH }}/builds/${{ matrix.platform }}-${{ matrix.resolved_arch }}
        key: h264-${{ env.OPENH264_VERSION }}-${{ matrix.platform }}
  
    - name: Setup Xcode 26.3
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.3'
      if: steps.cache-libs.outputs.cache-hit != 'true'
        
    - name: Install deps
      run: |
        brew install nasm autoconf automake libtool 
      shell: sh
      if: steps.cache-libs.outputs.cache-hit != 'true'
          
    - name: Build OpenH264 for ${{ matrix.arch }}
      id: build
      if: steps.cache-libs.outputs.cache-hit != 'true'
      run: |
        cd ${{ env.OPENH264_PATH }}
        h264_makefile="Makefile"
        h264_makefile_bak="Makefile.bak"

        case "${{ matrix.arch }}" in
          x86_64)
            platform="iPhoneSimulator"
            sdk="iphonesimulator"
            os="darwin"
            version_min="-mios-simulator-version-min=${{ env.MIN_IOS_VERSION }}"
            ;;
          arm64s)
            platform="iPhoneSimulator"
            sdk="iphonesimulator"
            os="darwin"
            version_min="-mios-simulator-version-min=${{ env.MIN_IOS_VERSION }}"
            ;;
          arm64)
            platform="iPhoneOS"
            sdk="iphoneos"
            os="ios"
            version_min="-miphoneos-version-min=${{ env.MIN_IOS_VERSION }}"
            ;;
        esac

        sdk_path=$(xcrun --sdk $sdk --show-sdk-path)
        developer_path=$(xcode-select -p)

        h264_prefix="${{ env.OPENH264_PATH }}/builds/${platform}-${{ matrix.resolved_arch }}"
        h264_log="${h264_prefix}/build.log"
        mkdir -p "${h264_prefix}/logs"

        echo "Building OpenH264 for ${{ matrix.arch }} ($platform, OS=$os, SDK=$sdk)"

        cp "${h264_makefile}" "${h264_makefile_bak}"
        sed -i.deleteme "s|^PREFIX=.*|PREFIX=${h264_prefix}|" "${h264_makefile}"
        rm -f ${h264_makefile}.deleteme

        export CFLAGS="-arch ${{ matrix.resolved_arch }} ${version_min} -isysroot ${sdk_path}"
        export LDFLAGS="-arch ${{ matrix.resolved_arch }} ${version_min} -isysroot ${sdk_path}"
        export SYSROOT="${sdk_path}"

        make OS=${os} ARCH=${{ matrix.resolved_arch }} \
            SDK_MIN=${{ env.MIN_IOS_VERSION }} v=No >> "${h264_log}" || exit 1

        make OS=${os} ARCH=${{ matrix.resolved_arch }} \
            SDK_MIN=${{ env.MIN_IOS_VERSION }} v=No install >> "${h264_log}" || exit 1

        make OS=${os} ARCH=${{ matrix.resolved_arch }} \
            SDK_MIN=${{ env.MIN_IOS_VERSION }} v=No clean >> "${h264_log}" || exit 1

        mv "${h264_makefile_bak}" "${h264_makefile}"

        echo "artifact=${h264_prefix}" >> "$GITHUB_OUTPUT"
      shell: bash
 
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: openh264-${{ matrix.arch }}
        path: ${{ env.OPENH264_PATH }}/builds/${{ matrix.platform }}-${{ matrix.resolved_arch }}
        overwrite: true

  openh264-mac:
    runs-on: macos-26
    name: openh264-mac
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        include:
          - platform: MacOSX
          - lib_name: openh264
          - sdk: macosx
    steps:
      
      - name: Cache H264 Built SDK
        id: cache-libs
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          key: ${{ matrix.lib_name }}-${{ env.OPENH264_VERSION }}-${{ matrix.platform }}-${{ env.SDKVERSION }}-${{ matrix.arch }}
      
      - name: Clone OpenH264
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          git clone --branch v2.3.0 https://github.com/cisco/openh264.git

      - name: Setup Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'
  
      - name: Install deps
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          brew install autoconf automake cmake libtool llvm nasm 
        shell: sh

      - name: Build OpenH264
        if: steps.cache-libs.outputs.cache-hit != 'true'
        id: build
        working-directory: openh264
        run: |
          mkdir -p ../logs
          target_triple="${{ matrix.arch }}-apple-ios${{ env.MIN_MACOSX_VERSION }}-macabi"
          version_min="-target ${target_triple}"        
          
          export OS="darwin"
          sdk_path=$(xcrun --sdk ${{ matrix.sdk }} --show-sdk-path)
          developer_path=$(xcode-select -p)

          h264_makefile="Makefile"
          h264_makefile_bak="Makefile.bak" 
          h264_prefix="${{ env.BUILT_SDK_PATH }}"
          
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            export ARCH="arm64"
            # SOCI=No disables production of dylib
            EXTRA_MAKE_ARGS="USE_ASM=Yes SOCI=No"
          else
            export ARCH="x86_64"
            # USE_ASM=No disables files include and search from x86/ folder
            # SOCI=No disables production of dylib
            EXTRA_MAKE_ARGS="USE_ASM=No SOCI=No"
          fi
          
          echo "Building OpenH264 for ${{ matrix.arch }} (${{ matrix.platform }}, OS=$OS, SDK=${{ matrix.sdk }}, Target=$target_triple)"

          cp "${h264_makefile}" "${h264_makefile_bak}"
          sed -i.deleteme "s|^PREFIX=.*|PREFIX=${h264_prefix}|" "${h264_makefile}"
          rm -f ${h264_makefile}.deleteme
          
          export CFLAGS="-arch ${{ matrix.arch }} ${version_min} -isysroot ${sdk_path}"
          export LDFLAGS="-arch ${{ matrix.arch }} ${version_min} -isysroot ${sdk_path}"
          export SYSROOT="${sdk_path}"

          # Compilação aplicando as flags mapeadas
          make ARCH=$ARCH $EXTRA_MAKE_ARGS SDK_MIN=${{ env.MIN_MACOSX_VERSION }} v=No libopenh264.a > ../logs/${{ matrix.lib_name }}-config-${{ matrix.arch }}.log 2>&1 || exit 1

          make ARCH=$ARCH $EXTRA_MAKE_ARGS SDK_MIN=${{ env.MIN_MACOSX_VERSION }} v=No install-static install-headers > ../logs/${{ matrix.lib_name }}-install-${{ matrix.arch }}.log 2>&1 || exit 1

          make ARCH=$ARCH $EXTRA_MAKE_ARGS SDK_MIN=${{ env.MIN_MACOSX_VERSION }} v=No clean > ../logs/${{ matrix.lib_name }}-clean-${{ matrix.arch }}.log 2>&1 || exit 1

          mv "${h264_makefile_bak}" "${h264_makefile}"

        shell: bash
        env:
          SDK_SUFFIX: ${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          BUILT_SDK_PATH: ${{ github.workspace }}/${{ env.SDK_SUFFIX }}

      - uses: actions/upload-artifact@v7
        name: Upload error logs
        if: failure()
        with:
          name: ${{ matrix.lib_name }}-${{ env.SDK_SUFFIX }}-logs
          path: |
            logs/*.log
        env:
          SDK_SUFFIX: ${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
            
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.lib_name }}-${{ env.SDK_SUFFIX }}
          path: |
            ${{ env.BUILT_SDK_PATH }}
            logs/*.log
        env:
          SDK_SUFFIX: ${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          BUILT_SDK_PATH: ${{ github.workspace }}/${{ env.SDK_SUFFIX }}

  openh264-win:
    name: openh264-win (x64)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache H264 Built SDK
        id: cache-libs
        uses: actions/cache@v5
        with:
          path: install/openh264/
          key: h264-${{ env.OPENH264_VERSION }}-win-x64
    
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: steps.cache-libs.outputs.cache-hit != 'true'
        with:
            arch: x64

      - name: Setup NASM
        if: steps.cache-libs.outputs.cache-hit != 'true'
        uses: ilammy/setup-nasm@v1

      - name: Create directories
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            New-Item -ItemType Directory -Force -Path "${env:ARTIFACTS_DIR}" | Out-Null
            New-Item -ItemType Directory -Force -Path "${env:LOGS_DIR}" | Out-Null
            New-Item -ItemType Directory -Force -Path "${env:INSTALL_DIR}" | Out-Null

      - name: Clone OpenH264
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            git clone `
            --branch "${env:OPENH264_VERSION}" `
            --depth 1 `
            https://github.com/cisco/openh264.git `
            openh264


      - name: Configure MSVC
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: cmd
        run: |
            call "E:\Program Files\Microsoft Visual Studio Community 2026\Common7\Tools\VsDevCmd.bat" -arch=x64
            echo Visual Studio environment loaded
            where cl
            where msbuild

      - name: Build OpenH264
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: cmd
        working-directory: openh264
        run: |
            set ARCH=x86_64

            make OS=msvc ARCH=%ARCH% BUILDTYPE=Release ^
            ENABLE64BIT=Yes ^
            DEBUGSYMBOLS=False 

            IF %ERRORLEVEL% NEQ 0 (
            exit /b %ERRORLEVEL%
            )

      - name: Prepare artifact structure
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            $target = "install/openh264/x64"

