            New-Item -ItemType Directory -Force -Path "$target\lib" | Out-Null
            New-Item -ItemType Directory -Force -Path "$target\include\wels" | Out-Null

      - name: Collect static libraries
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            $target = "install/openh264/x64/lib"

            Get-ChildItem openh264 -Recurse -Filter *.lib |
            Copy-Item -Destination $target -Force

      - name: Collect headers
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            $target = "install/openh264/x64/include/wels"

            Get-ChildItem openh264/codec/api/wels -Filter *.h |
            Copy-Item -Destination $target -Force

      - name: List generated files
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            Get-ChildItem "install/openh264" -Recurse

      - name: Upload OpenH264 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
            name: openh264-win-x64
            path: |
              install/openh264/x64/**/*
            if-no-files-found: warn

