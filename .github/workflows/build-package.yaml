          if [ "${{ matrix.arch }}" == "arm64" ]; then
            HOST="arm-apple-darwin"
            TARGET="arm64-apple-ios15.0-macabi"
            opus_opt_cflags="-O3 -ffast-math -flto -g -Wno-cast-align"
          else
            HOST="x86_64-apple-darwin"
            TARGET="x86_64-apple-ios15.0-macabi"
            opus_opt_cflags="-O3 -ffast-math -flto -g"
          fi

          ./autogen.sh

          ISYSROOT="${DEVELOPER}/Platforms/MacOSX.platform/Developer/SDKs/MacOSX${SDKVERSION}.sdk"

          CC="clang"                                                                                                          \
          ./configure                                                                                                         \
            --host=$HOST                                                                                                      \
            --disable-shared                                                                                                  \
            --with-pic                                                                                                        \
            --disable-extra-programs                                                                                          \
            --disable-doc                                                                                                     \
            --enable-static                                                                                                   \
            --enable-float-approx                                                                                             \
            --prefix="${{ env.BUILT_SDK_PATH }}"                                                                                           \
            LDFLAGS="${opus_opt_ldflags} -target $TARGET -isysroot ${ISYSROOT} -L${{ env.BUILT_SDK_PATH }}/lib"                            \
            CFLAGS="${opus_opt_cflags} -target $TARGET -arch ${{ matrix.arch }} -isysroot ${ISYSROOT} -I${{ env.BUILT_SDK_PATH }}/include" \
            > ../logs/opus-config-${{ matrix.arch }}.log 

          make -j$(sysctl -n hw.logicalcpu) \
            > ../logs/opus-build-${{ matrix.arch }}.log 

          make install \
            >> ../logs/opus-build-${{ matrix.arch }}.log 
        env:
          BUILT_SDK_PATH: ${{ github.workspace }}/${{ matrix.lib_name }}-${{ env.OPUS_VERSION }}-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk

      - uses: actions/upload-artifact@v7
        name: Upload error logs
        if: failure()
        with:
          name: ${{ matrix.lib_name }}-${{ env.OPUS_VERSION }}-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}-logs
          path: |
            logs/*.log 
          
      - uses: actions/upload-artifact@v7
        name: Upload opus artifact
        with:
          name: ${{ matrix.lib_name }}-${{ env.OPUS_VERSION }}-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          path: |
            ${{ env.BUILT_SDK_PATH }}
            logs/*.log
        env:
          BUILT_SDK_PATH: ${{ github.workspace }}/${{ matrix.lib_name }}-${{ env.OPUS_VERSION }}-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
      
  opus-win:
    name: opus-win (x64)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache opus Built SDK
        id: cache-libs
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/install/opus/x64
          key: opus-${{ env.OPUS_VERSION }}-win-x64

      - name: Setup MSVC
        if: steps.cache-libs.outputs.cache-hit != 'true'
        uses: ilammy/msvc-dev-cmd@v1
        with:
            arch: x64

      - name: Setup CMake
        if: steps.cache-libs.outputs.cache-hit != 'true'
        uses: lukka/get-cmake@latest

      - name: Create directories
        shell: pwsh
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
            New-Item -ItemType Directory -Force -Path "${env:ARTIFACTS_DIR}" | Out-Null
            New-Item -ItemType Directory -Force -Path "${env:LOGS_DIR}" | Out-Null
            New-Item -ItemType Directory -Force -Path "${env:INSTALL_DIR}" | Out-Null

      - name: Clone Opus
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            git clone `
            --branch "${env:OPUS_VERSION}" `
            --depth 1 `
            https://github.com/xiph/opus.git `
            opus

      - name: Configure MSVC
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: cmd
        run: |
            call "E:\Program Files\Microsoft Visual Studio Community 2026\Common7\Tools\VsDevCmd.bat" -arch=x64
            echo Visual Studio environment loaded
            where cl
            where msbuild

      - name: Configure Opus
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: cmd
        run: |
            cmake -S opus -B opus\build ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_INSTALL_PREFIX=%INSTALL_DIR%\opus\x64 ^
            -DBUILD_SHARED_LIBS=OFF ^
            -DOPUS_BUILD_SHARED_LIBRARY=OFF ^
            -DOPUS_BUILD_PROGRAMS=OFF ^
            -DOPUS_BUILD_TESTING=OFF ^
            -DCMAKE_POLICY_VERSION_MINIMUM='3.5' ^
            > %LOGS_DIR%\opus-x64-configure.log 2>&1

            IF %ERRORLEVEL% NEQ 0 (
            type %LOGS_DIR%\opus-x64-configure.log
            exit /b %ERRORLEVEL%
            )

      - name: Build Opus
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: cmd
        run: |
            cmake --build opus\build ^
            --config Release ^
            --parallel  
            IF %ERRORLEVEL% NEQ 0 ( 
            exit /b %ERRORLEVEL%
            )

      - name: Install Opus
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: cmd
        run: |
            cmake --install opus\build ^
            --config Release  

            IF %ERRORLEVEL% NEQ 0 ( 
            exit /b %ERRORLEVEL%
            )
 
      - name: Patch .lib files
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            cp -v "${env:INSTALL_DIR}\opus\x64\lib\opus.lib" "${env:INSTALL_DIR}\opus\x64\lib\libopus.a"
      
      - name: List generated files
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            Get-ChildItem "${env:INSTALL_DIR}\opus" -Recurse

      - name: Upload Opus artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
            name: opus-win-x64
            path: |
              install/opus/x64/**/*
            if-no-files-found: warn

  pjsip-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86, x86_64, armeabi-v7a, arm64-v8a]
      fail-fast: false
    needs: [bcg729-android, openh264-android, openssl-android, opus-android]
    name: pjsip - android
    permissions:
        contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: 'true'
  
    - name: Cache opus Built SDK
      id: cache-libs
      uses: actions/cache@v5
      with:
        path: ${{ env.PJSIP_BUILD_OUT_PATH }}/${{matrix.arch}}
        key: pjsip-${{ env.PJSIP_VERSION }}-android-${{ matrix.arch }}
     
    - uses: actions/setup-java@v4
      if: steps.cache-libs.outputs.cache-hit != 'true'
      with:
        distribution: 'temurin'
        java-version: '17'
        check-latest: true
      
    - name: Setup Android SDK
      if: steps.cache-libs.outputs.cache-hit != 'true'
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708 
        packages: platforms;android-28 tools platform-tools build-tools;34.0.0
    
    - uses: nttld/setup-ndk@v1
      if: steps.cache-libs.outputs.cache-hit != 'true'
      id: setup-ndk
      with:
        ndk-version: r28
        add-to-path: true
        link-to-sdk: true
      
    - name: Debug NDK
      if: steps.cache-libs.outputs.cache-hit != 'true'
      shell: bash
      run: |
        ls -R $ANDROID_NDK_HOME
      env: 
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

    - name: Prepare Environment
      if: steps.cache-libs.outputs.cache-hit != 'true'
      run: |
        cd ${{ github.workspace }}
        sudo mkdir -p /home/runner/libpjsua2 
        
        DEPS="unzip git curl bzip2 binutils make autoconf openssl \
          libssl-dev libopus0 libpcre3 libpcre3-dev build-essential nasm python3 swig libstdc++6 \
          libpthread-stubs0-dev \
          libc6-dev"
        sudo sh -c "dpkg --add-architecture i386; apt-get update  && apt-get install -y ${DEPS}"
    
    - uses: actions/download-artifact@v8
      if: steps.cache-libs.outputs.cache-hit != 'true'
      with:
        name: openssl-android
        path: ${{ github.workspace }}/output/openssl
      
    - uses: actions/download-artifact@v8
      if: steps.cache-libs.outputs.cache-hit != 'true'
      with:
        name: openh264-android
        path: ${{ github.workspace }}/output/openh264/
        
    - uses: actions/download-artifact@v8
      if: steps.cache-libs.outputs.cache-hit != 'true'
      with:
        name: opus-android
        path: ${{ github.workspace }}/output/opus/
        
    - uses: actions/download-artifact@v8
      if: steps.cache-libs.outputs.cache-hit != 'true'
      with:
        name: bcg729-android
        path: ${{ github.workspace }}/output/bcg729/
       
    - name: Create config_site.h
      if: steps.cache-libs.outputs.cache-hit != 'true'
      run: |
        echo "Creating config site file for Android ..."
        echo "#define PJ_CONFIG_ANDROID                 1" > ${{ env.CONFIG_SITE_PATH }}
        echo "#define PJMEDIA_HAS_G7221_CODEC           1" >> ${{ env.CONFIG_SITE_PATH }}
        echo "#define PJMEDIA_AUDIO_DEV_HAS_ANDROID_JNI 0" >> ${{ env.CONFIG_SITE_PATH }}
        echo "#define PJMEDIA_AUDIO_DEV_HAS_OPENSL      1" >> ${{ env.CONFIG_SITE_PATH }}
        echo "#define PJSIP_AUTH_AUTO_SEND_NEXT         0" >> ${{ env.CONFIG_SITE_PATH }}
        echo "Changing PJSIP_MAX_PKT_LEN to             6000"
        echo "#define PJSIP_MAX_PKT_LEN                 6000" >> ${{ env.CONFIG_SITE_PATH }}
        echo "Enabling BCG729 in config_site"
        echo "#define PJMEDIA_HAS_BCG729                1" >> ${{ env.CONFIG_SITE_PATH }}
        echo "Enabling h264 and Video support in config_site"
        echo "#define PJMEDIA_HAS_VIDEO                 1" >> ${{ env.CONFIG_SITE_PATH }}
        echo "#define PJMEDIA_HAS_OPENH264_CODEC        1" >> ${{ env.CONFIG_SITE_PATH }}
        echo "Enabling Opus in config_site"
        echo "#define PJMEDIA_HAS_OPUS_CODEC            1" >> ${{ env.CONFIG_SITE_PATH }} 
        echo "Enabling SSL in config_site"
        echo "#define PJ_HAS_SSL_SOCK                   1" >> ${{ env.CONFIG_SITE_PATH }}
        echo "#define PJ_SSL_SOCK_IMP                   PJ_SSL_SOCK_IMP_OPENSSL" >> ${{ env.CONFIG_SITE_PATH }}
        echo "#include <pj/config_site_sample.h>" >> ${{ env.CONFIG_SITE_PATH }}
        sed -i'' -e 's/xamarin/maui/g' ${{ env.PJSIP_PATH }}/pjsip-apps/src/swig/csharp/Makefile

    - name: Build
      if: steps.cache-libs.outputs.cache-hit != 'true'
      id: build-pj
      run: |
        cd ${{ env.PJSIP_PATH }}
        mkdir -p ${{ env.PJSIP_TMP_PATH }} 
        cp -r * ${{ env.PJSIP_TMP_PATH }}
        cd  ${{ env.PJSIP_TMP_PATH }}
        echo "Configuring for ${{ matrix.arch }}"
        APP_PLATFORM=android-${{ env.TARGET_ANDROID_API }} TARGET_ABI=${{ matrix.arch }} ./configure-android --use-ndk-cflags --with-ssl=${{ env.OPENSSL_BUILD_OUT_PATH }}/libs/${{ matrix.arch }} --with-openh264=${{ env.OPENH264_BUILD_OUT_PATH }}/libs/${{ matrix.arch }} --with-opus=${{ env.OPUS_BUILD_OUT_PATH }}/${{ matrix.arch }} --with-bcg729=${{ env.BCG729_BUILD_OUT_PATH }}/libs/${{ matrix.arch}}
        echo "Make dep"
        make dep
        echo ""
        echo "make"
        make
        cd ${{ env.PJSUA_BASE_DIR }}
        make
        mkdir -p ${{ env.PJSIP_BUILD_OUT_PATH }}/${{ matrix.arch }}
        mkdir -p ${{ env.PJSIP_BUILD_OUT_PATH }}/${{matrix.arch}}/csharp
        mkdir -p ${{ env.PJSIP_BUILD_OUT_PATH }}/${{matrix.arch}}/java

        mv ${{ env.PJSUA_GENERATED_SO_PATH }}/*/* ${{ env.PJSIP_BUILD_OUT_PATH }}/${{ matrix.arch }}
        cp ${{ github.workspace }}/output/openh264/libs/${{ matrix.arch }}/lib/libopenh264.so ${{ env.PJSIP_BUILD_OUT_PATH }}/${{ matrix.arch }}
        cp ${{ github.workspace }}/output/bcg729/libs/${{ matrix.arch }}/lib/libbcg729.so ${{ env.PJSIP_BUILD_OUT_PATH }}/${{ matrix.arch }}
        cp ${{ github.workspace }}/output/openssl/libs/${{ matrix.arch }}/lib/libssl.so ${{ env.PJSIP_BUILD_OUT_PATH }}/${{ matrix.arch }}
        cp ${{ github.workspace }}/output/openssl/libs/${{ matrix.arch }}/lib/libcrypto.so ${{ env.PJSIP_BUILD_OUT_PATH }}/${{ matrix.arch }}
        cp -r -v ${{ env.PJSUA_GENERATED_SO_DIR }}/${{ matrix.arch }}/*  ${{ env.PJSIP_BUILD_OUT_PATH }}/${{ matrix.arch }}
        cp -r -v ${{ env.PJSUA_GENERATED_JAVA_SRC_DIR }} ${{ env.PJSIP_BUILD_OUT_PATH }}/${{matrix.arch}}/java
        cp -r -v ${{ env.PJSUA_GENERATED_CSHARP_DIR }} ${{ env.PJSIP_BUILD_OUT_PATH }}/${{matrix.arch}}/csharp
        echo "artifact=${{ env.PJSIP_BUILD_OUT_PATH }}/${{matrix.arch}}" >> "$GITHUB_OUTPUT" 
      env:
        ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}

    - name: Upload pjsip artifacts
      uses: actions/upload-artifact@v7
      with:
        name: pjsip-android-${{ matrix.arch }}
        path: ${{ env.PJSIP_BUILD_OUT_PATH }}/${{matrix.arch}}
        overwrite: true
 
    env:
      OPENSSL_LIB_PATH: ${{ github.workspace }}/output/openssl/libs/
      OPENh264_LIB_PATH: ${{ github.workspace }}/output/openh264/libs/
      OPUS_LIB_PATH: ${{ github.workspace }}/output/opus/libs/
      BCG729_LIB_PATH: ${{ github.workspace }}/output/bcg729/libs/
      PJSIP_TMP_PATH: /tmp/pjsip
      CONFIG_SITE_PATH: ${{ github.workspace }}/lib/pjsip/pjlib/include/pj/config_site.h
      PJSUA_GENERATED_CSHARP_DIR: /tmp/pjsip/pjsip-apps/src/swig/csharp/pjsua2maui/pjsua2maui/pjsua2
      PJSUA_GENERATED_JAVA_SRC_DIR: /tmp/pjsip/pjsip-apps/src/swig/java/android/pjsua2/src/main/java
      PJSUA_GENERATED_SO_PATH: /tmp/pjsip/pjsip-apps/src/swig/java/android/pjsua2/src/main/jniLibs
      PJSUA_GENERATED_SO_DIR: /tmp/pjsip/pjsip-apps/src/swig/csharp/pjsua2maui/pjsua2maui.Android/lib
      PJSUA_BASE_DIR: /tmp/pjsip/pjsip-apps/src/swig
      TARGET_ANDROID_API: 28
      OPENSSL_BUILD_OUT_PATH: ${{ github.workspace }}/output/openssl
      OPENH264_BUILD_OUT_PATH: ${{ github.workspace}}/output/openh264
      OPUS_BUILD_OUT_PATH: ${{ github.workspace }}/output/opus/outputs
      BCG729_BUILD_OUT_PATH: ${{ github.workspace }}/output/bcg729

  pjsip-ios:
    strategy:
      matrix:
        arch: [x86_64, arm64, arm64s]
        include:
        - arch: arm64
          resolved_arch: arm64
          sdk: iphoneos
          platform: iPhoneOS
        - arch: arm64s
          resolved_arch: arm64
          sdk: iphonesimulator
          platform: iPhoneSimulator
        - arch: x86_64
          resolved_arch: x86_64
          sdk: iphonesimulator
          platform: iPhoneSimulator
      fail-fast: false
    runs-on: macos-15
    needs: [bcg729-ios, openh264-ios, openssl-ios, opus-ios]
    name: pjsip - ios
    permissions:
      contents: write
    steps:
      
      - name: Checkout 
        uses: actions/checkout@v6
        with:
          submodules: true
 
      - name: Cache pjsip Built SDK
        uses: actions/cache@v5
        id: cache-libs
        with:
          path: ${{ github.workspace }}/pjsip-${{matrix.arch}}
          key: pjsip-${{ env.PJSIP_VERSION }}${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}

      - uses: actions/download-artifact@v8
        if: steps.cache-libs.outputs.cache-hit != 'true'
        with:
          name: openssl-${{ matrix.arch }}
          path: ${{ github.workspace }}/libs/ssl/
          
      
      - uses: actions/download-artifact@v8
        if: steps.cache-libs.outputs.cache-hit != 'true'
        with:
          name: openh264-${{ matrix.arch }}
          path: ${{ github.workspace }}/libs/h264/
      
      - uses: actions/download-artifact@v8
        if: steps.cache-libs.outputs.cache-hit != 'true'
        with:
          name: opus-${{ matrix.arch }}
          path: ${{ github.workspace }}/libs/opus/
      
      - uses: actions/download-artifact@v8
        if: steps.cache-libs.outputs.cache-hit != 'true'
        with:
          name: bcg729-${{ matrix.arch }}
          path: ${{ github.workspace }}/libs/bcg729/
     
      - name: Install dependencies
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          brew install automake autoconf libtool pkg-config swig llvm

      - name: Setup Xcode 26.3
        if: steps.cache-libs.outputs.cache-hit != 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'
 
      - name: Build pjsip
        id: build-pj-ios
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          cp -f ${{ github.workspace }}/res/pj/config_site.h ${{ env.PJSIP_PATH }}/pjlib/include/pj/config_site.h
          mkdir -p ~/pjsip_build/bundle/${{ matrix.arch }}
          cp -r ${{ env.PJSIP_PATH }} ~/pjsip_build/bundle/${{ matrix.arch }}
          cd ~/pjsip_build/bundle/${{ matrix.arch }}/pjsip
          export SDKVERSION=$(xcrun -sdk ${{ matrix.sdk }} --show-sdk-version)
          export IPHONESDK="${{ matrix.platform}}${SDKVERSION}.sdk" 
          export DEVPATH="$(xcode-select -p)/Platforms/${{ matrix.platform }}.platform/Developer"
          export SDKROOT="${DEVPATH}/SDKs/${{ matrix.platform }}.sdk"
          export SDKPATH="${DEVPATH}/SDKs/${IPHONESDK}" 

          if [ "${{ matrix.arch }}" == "arm64" ]; then
            export CFLAGS=" -arch ${{ matrix.resolved_arch }} ${CFLAGS}"
            export LDFLAGS="-arch ${{ matrix.resolved_arch }} ${LDFLAGS}"
            export MIN_IOS=-miphoneos-version-min=${{ env.MIN_IOS_VERSION }}
          else
            export CFLAGS=" -arch ${{ matrix.resolved_arch }} ${CFLAGS} -O2 -m64"
            export LDFLAGS="-arch ${{ matrix.resolved_arch }} ${LDFLAGS} -O2 -m64"
            export MIN_IOS="-mios-simulator-version-min=${{ env.MIN_IOS_VERSION }}"
          fi
           
          ARCH="-arch ${{ matrix.resolved_arch }}" ./configure-iphone \
              --with-bcg729=${{ github.workspace }}/libs/bcg729 \
              --with-ssl=${{ github.workspace }}/libs/ssl \
              --with-opus=${{ github.workspace }}/libs/opus \
              --with-openh264=${{ github.workspace }}/libs/h264
          echo "FLAGS AFTER CONFIGURE:"
          echo ""
          echo "CFLAGS=${CFLAGS}"
          echo "LDFLAGS=${LDFLAGS}"
          # Deduplicar CFLAGS
          export CFLAGS=$(echo "$CFLAGS" | tr ' ' '\n' | awk '!seen[$0]++' | tr '\n' ' ')
          # Deduplicar LDFLAGS
          export LDFLAGS=$(echo "$LDFLAGS" | tr ' ' '\n' | awk '!seen[$0]++' | tr '\n' ' ')
          echo "FLAGS AFTER DEDUPLICATE:"
          echo ""
          echo "CFLAGS=${CFLAGS}"
          echo "LDFLAGS=${LDFLAGS}"
          
          make dep
          make
          cd ./pjsip-apps/src/swig
          sed -i'' -e 's/xamarin/maui/g' ./csharp/Makefile
          make
          mkdir -p ${{ github.workspace }}/pjsip-${{matrix.arch}}/lib
          mkdir -p ${{ github.workspace }}/pjsip-${{matrix.arch}}/cs
          cp -v -f ${{ github.workspace }}/libs/ssl/lib/*.a ${{ github.workspace }}/pjsip-${{matrix.arch}}/lib
          cp -v -f ${{ github.workspace }}/libs/opus/lib/*.a ${{ github.workspace }}/pjsip-${{matrix.arch}}/lib
          cp -v -f ${{ github.workspace }}/libs/bcg729/lib/*.a ${{ github.workspace }}/pjsip-${{matrix.arch}}/lib
          cp -v -f ${{ github.workspace }}/libs/h264/lib/*.a ${{ github.workspace }}/pjsip-${{matrix.arch}}/lib
          cp -v -f ./csharp/pjsua2maui/pjsua2maui.iOS/lib/${{ matrix.resolved_arch }}/*.a ${{ github.workspace }}/pjsip-${{matrix.arch}}/lib
          cp -v -f ./csharp/pjsua2maui/pjsua2maui/pjsua2/*.cs ${{ github.workspace }}/pjsip-${{matrix.arch}}/cs
          echo "artifact=${{ github.workspace }}/pjsip-${{matrix.arch}}" >> "$GITHUB_OUTPUT"
        env:
          MIN_IOS_VERSION: 15.0
          BUILD_THREADS: $(sysctl -n hw.ncpu)

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pjsip-${{ matrix.arch }}
          path: ${{ github.workspace }}/pjsip-${{matrix.arch}}
          overwrite: true
       
  pjsip-mac:
    runs-on: macos-26
    needs: [bcg729-mac, openh264-mac, openssl-mac, opus-mac]
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        include:
        - lib_name: pjsip
        - platform: MacOSX
        - sdk: macosx
    steps:
      
      - name: Cache pjsip Built SDK
        uses: actions/cache@v5
        id: cache-libs
        with:
          path: ${{ github.workspace }}/${{ matrix.lib_name}}-${{ env.PJSIP_VERSION }}-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          key: ${{ matrix.lib_name}}-${{ env.PJSIP_VERSION }}-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}

      - uses: actions/checkout@v6
      - name: Clone PJSIP
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          git clone --branch $PJSIP_VERSION https://github.com/pjsip/pjproject.git
        env:  
          PJSIP_VERSION: 2.16

      - name: Setup Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        if: steps.cache-libs.outputs.cache-hit != 'true'
        with:
          xcode-version: '26.3'
  
      - name: Install deps
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          brew install nasm autoconf automake libtool swig pkg-config llvm
        shell: sh

      - uses: actions/download-artifact@v8
        if: steps.cache-libs.outputs.cache-hit != 'true'
        name: Download bcg729 macos
        with:
          name: ${{ env.BCG_SDK_NAME }}
          path: ${{ github.workspace }}/libs/bcg729
        env:
          BCG_SDK_NAME: bcg729-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
     
      - uses: actions/download-artifact@v8
        if: steps.cache-libs.outputs.cache-hit != 'true'
        name: Download H264 macos
        with:
          name: ${{ env.H264_SDK_NAME }}
          path: ${{ github.workspace }}/libs/h264
        env:
          H264_SDK_NAME: openh264-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
       
      - uses: actions/download-artifact@v8
        if: steps.cache-libs.outputs.cache-hit != 'true'
        name: Download SSL macos
        with:
          name: ${{ env.SSL_SDK_NAME }}
          path: ${{ github.workspace }}/libs/ssl
        env:
          SSL_SDK_NAME: openssl-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
      
      - uses: actions/download-artifact@v8
        if: steps.cache-libs.outputs.cache-hit != 'true'
        name: Download opus macos (${{ matrix.arch }})
        with:
          name: ${{ env.OPUS_SDK_NAME }}
          path: ${{ github.workspace }}/libs/opus
        env:
          OPUS_SDK_NAME: opus-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk

      - name: Copy config_site.h to PJSIP
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          TARGET_CONFIG_DIR="pjproject/pjlib/include/pj"
          mkdir -p "$TARGET_CONFIG_DIR"
          cp "${{ github.workspace }}/res/pj/pjsua2maui/config_site.h" "$TARGET_CONFIG_DIR/config_site.h"
          
      - name: Build PJSIP
        id: build-pjsip-mac
        if: steps.cache-libs.outputs.cache-hit != 'true'
        working-directory: pjproject
        run: |
          mkdir -p ../logs
           
          CATALYST_SYSTEM_INCLUDES="$SDKPATH/System/iOSSupport/usr/include"
          export ARCH=${{ matrix.arch }}
          export TARGET="${{ matrix.arch }}-apple-ios15.0-macabi"
          export CC="clang -target $TARGET"
          export CXX="clang++ -target $TARGET"
          export SDKVERSION=${{ env.SDKVERSION }}
          export MACOSXSDK="${{ matrix.platform}}${SDKVERSION}.sdk" 
          export SDKPATH=$(xcrun -sdk ${{ matrix.sdk }} --show-sdk-path)
          CATALYST_SYSTEM_FRAMEWORKS="$SDKPATH/System/iOSSupport/System/Library/Frameworks"
          CATALYST_SYSTEM_INCLUDES="$SDKPATH/System/iOSSupport/usr/include"
          export CFLAGS="${CFLAGS} -I${{ env.BCG_ROOT }}/include -I${{ env.H264_ROOT }}/include -I${{ env.SSL_ROOT }}/include -I${{ env.OPUS_ROOT }}/include "
          export LDFLAGS="${LDFLAGS} -L${{ env.BCG_ROOT }}/lib -lbcg729 -L${{ env.H264_ROOT }}/lib -lopenh264 -L${{ env.SSL_ROOT }}/lib -lssl -lcrypto -L${{ env.OPUS_ROOT }}/lib -lopus"
          if [[ '${{ matrix.arch }}' == 'arm64' ]]; then
            export CFLAGS="-arch arm64 -target arm64-apple-ios15.0-macabi -isysroot $SDKPATH -fPIC ${CFLAGS} -isystem $CATALYST_SYSTEM_INCLUDES -iframework $CATALYST_SYSTEM_FRAMEWORKS" 
            export CXXFLAGS="-arch arm64 -target arm64-apple-ios15.0-macabi -isysroot $SDKPATH -fPIC ${CXXFLAGS} -isystem $CATALYST_SYSTEM_INCLUDES -iframework $CATALYST_SYSTEM_FRAMEWORKS"
            export LDFLAGS="-arch arm64 -target arm64-apple-ios15.0-macabi -isysroot $SDKPATH ${LDFLAGS} -F$CATALYST_SYSTEM_FRAMEWORKS"
          else
            export CFLAGS="-arch x86_64 -target x86_64-apple-ios15.0-macabi -isysroot $SDKPATH -fPIC ${CFLAGS} -isystem $CATALYST_SYSTEM_INCLUDES -iframework $CATALYST_SYSTEM_FRAMEWORKS"
            export CXXFLAGS="-arch x86_64 -target x86_64-apple-ios15.0-macabi -isysroot $SDKPATH -fPIC ${CXXFLAGS} -isystem $CATALYST_SYSTEM_INCLUDES -iframework $CATALYST_SYSTEM_FRAMEWORKS"
            export LDFLAGS="-arch x86_64 -target x86_64-apple-ios15.0-macabi -isysroot $SDKPATH ${LDFLAGS} -F$CATALYST_SYSTEM_FRAMEWORKS"
          fi

          ./configure                            \
            --host=${{ matrix.arch }}-apple-darwin            \
            --disable-shared                     \
            --with-bcg729=${{ env.BCG_ROOT }}    \
            --with-ssl=${{ env.SSL_ROOT }}       \
            --with-opus=${{ env.OPUS_ROOT }}     \
            --with-openh264=${{ env.H264_ROOT }} \
            CFLAGS="$CFLAGS"                     \
            LDFLAGS="$LDFLAGS"                   \
            CXXFLAGS="$CXXFLAGS" > ../logs/pjsip-config-${{ matrix.arch }}.log || exit 1

          echo "FLAGS AFTER CONFIGURE:"
          echo "CFLAGS=${CFLAGS}"
          echo "LDFLAGS=${LDFLAGS}"
          
          export CFLAGS=$(echo "$CFLAGS" | tr ' ' '\n' | awk '!seen[$0]++' | tr '\n' ' ')
          export LDFLAGS=$(echo "$LDFLAGS" | tr ' ' '\n' | awk '!seen[$0]++' | tr '\n' ' ')

          echo "starting make dep"

          make dep > ../logs/pjsip-dep-${{ matrix.arch }}.log || exit 1 

          echo 'Done make dep' >> ../logs/pjsip-dep-${{ matrix.arch }}.log

          echo "starting make"

          make lib > ../logs/pjsip-build-${{ matrix.arch }}.log || exit 1

          echo 'Done make lib' >> ../logs/pjsip-build-${{ matrix.arch }}.log

          cd ./pjsip-apps/src/swig/csharp/pjsua2maui/
          
          cp -v -f ${{ github.workspace}}/res/pj/pjsua2maui/Makefile . 

          echo "starting make mac"

          make mac -j$(sysctl -n hw.logicalcpu) > ${{ github.workspace }}/logs/pjsip-swig-${{ matrix.arch }}.log || exit 1
          
          echo 'Done make mac' >> ${{ github.workspace }}/logs/pjsip-swig-${{ matrix.arch }}.log
          
          OUTPUT_DIR=""
          mkdir -p "${{ env.BUILT_SDK_PATH }}/lib"
          mkdir -p "${{ env.BUILT_SDK_PATH }}/cs" 

          cp -v -f ${{ env.BCG_ROOT }}/lib/*.a . 
          cp -v -f ${{ env.H264_ROOT }}/lib/*.a .
          cp -v -f ${{ env.OPUS_ROOT }}/lib/*.a .
          cp -v -f ${{ env.SSL_ROOT }}/lib/*.a .
          cp -v -f ./pjsua2maui/Platforms/MacCatalyst/pjsua2/${{ matrix.arch }}/libpjsua2.a .
          
          libtool -static -o "$OUTPUT_DIR/lib/libpjsua2.a" ./*.a
          
          cp -v -f ./pjsua2maui/Platforms/MacCatalyst/pjsua2/*.cs "${{ env.BUILT_SDK_PATH }}/cs/"

        shell: bash
        env:
          BCG_SDK_NAME: bcg729-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          H264_SDK_NAME: openh264-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          OPUS_SDK_NAME: opus-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          SSL_SDK_NAME: openssl-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          BCG_ROOT: ${{ github.workspace }}/libs/bcg729
          H264_ROOT: ${{ github.workspace }}/libs/h264
          OPUS_ROOT: ${{ github.workspace }}/libs/opus
          SSL_ROOT: ${{ github.workspace }}/libs/ssl
          BUILT_SDK_PATH:  ${{ github.workspace }}/${{ matrix.lib_name}}-${{ env.PJSIP_VERSION }}-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk

      - uses: actions/upload-artifact@v7
        name: Upload error logs
        if: steps.cache-libs.outputs.cache-hit != 'true' && failure()  
        with:
          name: ${{ matrix.lib_name }}-${{ env.SDK_SUFFIX }}-logs
          path: logs/*.log
        env:
          SDK_SUFFIX: ${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk

      - uses: actions/upload-artifact@v7
        name: Upload pjsip artifact
        with:
          name: ${{ matrix.lib_name}}-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
          path: |
            ${{ env.BUILT_SDK_PATH }}
        env:
          BUILT_SDK_PATH: ${{ github.workspace }}/${{ matrix.lib_name}}-${{ env.PJSIP_VERSION }}-${{ matrix.platform }}${{ env.SDKVERSION }}-${{ matrix.arch }}.sdk
   
  pjsip-win:
    name: Build PJSIP (x64)
    runs-on: windows-2022
    needs: [bcg729-win, openh264-win, openssl-win, opus-win]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pjsip Built SDK
        id: cache-libs
        uses: actions/cache@v5
        with:
          path: |
            src/libpjsua2.win.dll/**/*
            src/libpjsua2maui.win/bin/**/*
          key: pjsip-${{ env.PJSIP_VERSION }}-win-x64

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Setup NASM
        uses: ilammy/setup-nasm@v1
        if: steps.cache-libs.outputs.cache-hit != 'true'
             
      - name: Validate SWIG
        shell: pwsh
        run: |
          swig -version
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Create directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${env:ARTIFACTS_DIR}" | Out-Null
          New-Item -ItemType Directory -Force -Path "${env:LOGS_DIR}" | Out-Null
          New-Item -ItemType Directory -Force -Path "${env:INSTALL_DIR}" | Out-Null
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Download OpenSSL
        uses: actions/download-artifact@v4
        with:
          name: openssl-win-x64
          path: deps/openssl
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Download Opus
        uses: actions/download-artifact@v4
        with:
          name: opus-win-x64
          path: deps/opus
        if: steps.cache-libs.outputs.cache-hit != 'true'
   
      - name: Download BCG729
        uses: actions/download-artifact@v4
        with:
          name: bcg729-win-x64
          path: deps/bcg729
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Download OpenH264
        uses: actions/download-artifact@v4
        with:
          name: openh264-win-x64
          path: deps/openh264
        if: steps.cache-libs.outputs.cache-hit != 'true'
  
      - name: Clone PJSIP
        shell: pwsh
        run: |
          git clone --branch "${env:PJSIP_VERSION}" --depth 1 https://github.com/pjsip/pjproject.git pjproject
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Create config_site.h
        shell: pwsh
        run: |
          $config = @"
          #include <pj/config_site_sample.h>
          #define PJ_HAS_IPV6                       1
          #define PJ_HAS_SSL_SOCK                   1
          #define PJ_SSL_SOCK_IMP                   PJ_SSL_SOCK_IMP_OPENSSL
          #define PJSIP_HAS_TLS_TRANSPORT           1
          #define PJMEDIA_AUDIO_DEV_HAS_PORTAUDIO   0
          #define PJMEDIA_HAS_VIDEO                 1
          #define PJMEDIA_HAS_OPENH264_CODEC        1
          #define PJMEDIA_HAS_OPUS_CODEC            1
          #define PJMEDIA_HAS_BCG729                1
          #define PJ_DLL                            1
          #define PJ_EXPORTING                      1
          #define PJ_EXPORT_SPECIFIER               __declspec(dllexport)
          #define PJ_IMPORT_SPECIFIER               __declspec(dllimport)

          "@

          New-Item -ItemType Directory -Force -Path "pjproject/pjlib/include/pj" | Out-Null
          Set-Content -Path "pjproject/pjlib/include/pj/config_site.h" -Value $config
        if: steps.cache-libs.outputs.cache-hit != 'true'

      - name: Patch SWIG C# vcxproj linker settings
        working-directory: pjproject
        shell: pwsh
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          $projects = Get-ChildItem -Recurse -Filter *.vcxproj

          foreach ($proj in $projects) {
              Write-Host "Patching $($proj.FullName)"

              [xml]$xml = Get-Content $proj.FullName

              $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
              $ns.AddNamespace("msb", "http://schemas.microsoft.com/developer/msbuild/2003")

              $links = $xml.SelectNodes("//msb:ItemDefinitionGroup/msb:Link", $ns)

              foreach ($link in $links) {

                  #
                  # Remove legacy duplicate OpenSSL libs
                  #
                  $depsNode = $link.SelectSingleNode("msb:AdditionalDependencies", $ns)

                  if ($depsNode -ne $null) {

                      $deps = $depsNode.InnerText.Split(';') |
                          ForEach-Object { $_.Trim() } |
                          Where-Object { $_ -ne "" }

                      $filtered = @()
                      $hasModernOpenSsl = $false

                      foreach ($d in $deps) {
                          if ($d -ieq "libssl.lib" -or $d -ieq "libcrypto.lib") {
                              $hasModernOpenSsl = $true
                          }
                      }

                      foreach ($d in $deps) {

                          #
                          # Remove duplicate legacy ssl/crypto
                          #
                          if ($hasModernOpenSsl -and (
                              $d -ieq "ssl.lib" -or
                              $d -ieq "crypto.lib"
                          )) {
                              Write-Host "Removing duplicate dependency: $d"
                              continue
                          }

                          #
                          # Avoid duplicated entries
                          #
                          if ($filtered -notcontains $d) {
                              $filtered += $d
                          }
                      }

                      $depsNode.InnerText = ($filtered -join ';')
                  }

                  #
                  # Remove IgnoreSpecificDefaultLibraries
                  #
                  $ignoreNode = $link.SelectSingleNode("msb:IgnoreSpecificDefaultLibraries", $ns)

                  if ($ignoreNode -ne $null) {
                      Write-Host "Removing IgnoreSpecificDefaultLibraries"
                      $link.RemoveChild($ignoreNode) | Out-Null
                  }

                  #
                  # Remove NODEFAULTLIB from AdditionalOptions
                  #
                  $optsNode = $link.SelectSingleNode("msb:AdditionalOptions", $ns)

                  if ($optsNode -ne $null) {

                      $opts = $optsNode.InnerText

                      $opts = $opts -replace '/NODEFAULTLIB:msvcrt\.lib', ''
                      $opts = $opts -replace '/NODEFAULTLIB', ''

                      $opts = ($opts -split '\s+' | Where-Object { $_ -ne "" }) -join ' '

                      $optsNode.InnerText = $opts
                  }
              }

              $xml.Save($proj.FullName)
          }
 
      - name: Retarget Windows SDK
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            $projects = Get-ChildItem pjproject -Recurse -Filter *.vcxproj

            foreach ($proj in $projects)
            {
                Write-Host "Retargeting $($proj.FullName)"

                [xml]$xml = Get-Content $proj

                $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
                $ns.AddNamespace("ns", "http://schemas.microsoft.com/developer/msbuild/2003")

                $nodes = $xml.SelectNodes("//ns:WindowsTargetPlatformVersion", $ns)

                foreach ($node in $nodes)
                {
                    $node.InnerText = "10.0"
                }

                $xml.Save($proj.FullName)
            }

      - name: Enable bigobj for SWIG wrapper
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            $proj = "pjproject\pjsip-apps\build\swig_csharp_pjsua2.vcxproj"

            [xml]$xml = Get-Content $proj

            $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
            $ns.AddNamespace("ns", "http://schemas.microsoft.com/developer/msbuild/2003")

            $nodes = $xml.SelectNodes("//ns:ClCompile", $ns)

            foreach ($node in $nodes)
            {
                $optNode = $node.SelectSingleNode("ns:AdditionalOptions", $ns)

                if ($null -eq $optNode)
                {
                    $optNode = $xml.CreateElement("AdditionalOptions", $xml.Project.NamespaceURI)
                    $node.AppendChild($optNode) | Out-Null
                }

                if ($optNode.InnerText -notmatch "/bigobj")
                {
                    $optNode.InnerText = "/bigobj %(AdditionalOptions)"
                }
            }

            $xml.Save($proj)            
  
      - name: Patch SWIG linker settings
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            $proj = "pjproject\pjsip-apps\build\swig_csharp_pjsua2.vcxproj"

            [xml]$xml = Get-Content $proj

            $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
            $ns.AddNamespace("ns", "http://schemas.microsoft.com/developer/msbuild/2003")

            $links = $xml.SelectNodes("//ns:Link", $ns)

            foreach ($link in $links)
            {
                $deps = $link.SelectSingleNode("ns:AdditionalDependencies", $ns)

                if ($null -eq $deps)
                {
                    $deps = $xml.CreateElement("AdditionalDependencies", $xml.Project.NamespaceURI)
                    $link.AppendChild($deps) | Out-Null
                }

                $deps.InnerText = @(
                    "opus.lib",
                    "bcg729.lib",
                    "openh264.lib",
                    "ssl.lib",
                    "crypto.lib",
                    "ws2_32.lib",
                    "crypt32.lib",
                    "iphlpapi.lib",
                    "secur32.lib",
                    "%(AdditionalDependencies)"
                ) -join ";"
            }

            $xml.Save($proj)

      - name: Force bcg729 static headers
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            $headers = @(
                "deps/bcg729/include/bcg729/encoder.h",
                "deps/bcg729/include/bcg729/decoder.h"
            )

            foreach ($header in $headers)
            {
                Write-Host "Patching $header"

                $content = Get-Content $header -Raw

                $content = $content -replace `
                    "#define BCG729_VISIBILITY __declspec\(dllimport\)", `
                    "#define BCG729_VISIBILITY"

                $content = $content -replace `
                    "#define BCG729_VISIBILITY __declspec\(dllexport\)", `
                    "#define BCG729_VISIBILITY"

                Set-Content $header $content
            }            

      - name: Patch c# namespace
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
            $projectFile = "pjproject\pjsip-apps\build\swig_csharp_pjsua2.vcxproj"

            $oldNs = 'pjsua2xamarin'
            $newNs = 'pjsua2maui'

            (Get-Content $projectFile) `
            -replace [regex]::Escape($oldNs), $newNs |
            Set-Content $projectFile

      - name: Validate Deps
        if: steps.cache-libs.outputs.cache-hit != 'true'
        working-directory: deps
        shell: pwsh
        run: |
            Get-ChildItem . -Recurse
    
      - name: Build 
        shell: pwsh
        if: steps.cache-libs.outputs.cache-hit != 'true'
        working-directory: pjproject
        run: |
          # Include Path Mapping from third party libraries
          $DepsDir    = "${env:GITHUB_WORKSPACE}/deps"
          $OpusLib    = "${DepsDir}/opus/lib"
          $Bcg729Lib  = "${DepsDir}/bcg729/lib"
          $H264Lib    = "${DepsDir}/openh264/lib"
          $SslLib     = "${DepsDir}/openssl/lib"
          $OpusInc    = "${DepsDir}/opus/include"
          $Bcg729Inc  = "${DepsDir}/bcg729/include"
          $H264Inc    = "${DepsDir}/openh264/include"
          $SslInc     = "${DepsDir}/openssl/include"

          Write-Host "=== Windows Native SDK Infrastructure Mapping ==="
          $SdkInc     = $env:WindowsSdkDir + "Include\" + $env:WindowsSDKVersion
          $UcrtInc    = "${SdkInc}\ucrt"
          $SharedInc  = "${SdkInc}\shared"
          $UmInc      = "${SdkInc}\um"
          $MsvcInc    = $env:VCINSTALLDIR + "Tools\MSVC\" + $env:VCToolsVersion + "\include"

          # INCLUDE setup
          $IncludePaths = @($MsvcInc, $UcrtInc, $SharedInc, $UmInc, $OpusInc, $Bcg729Inc, $H264Inc, $SslInc)
          if ($env:INCLUDE) { $IncludePaths += $env:INCLUDE }
          $env:INCLUDE = $IncludePaths -join ";"
          
          # Link Libraries Folder Mapping (.lib)
          $SdkLib     = $env:WindowsSdkDir + "Lib\" + $env:WindowsSDKVersion
          $UcrtLib    = "${SdkLib}\ucrt\x64"
          $UmLib      = "${SdkLib}\um\x64"
          $MsvcLib    = $env:VCINSTALLDIR + "Tools\MSVC\" + $env:VCToolsVersion + "\lib\x64"

          $LibPaths = @($OpusLib, $Bcg729Lib, $H264Lib, $SslLib, $MsvcLib, $UcrtLib, $UmLib)
          if ($env:LIB) { $LibPaths += $env:LIB }
          $env:LIB = $LibPaths -join ";"

          Write-Host "=== Building with environment variables ==="
          # O parâmetro /p:UseEnv=true obriga o Linker a usar o nosso $env:LIB corrigido
          msbuild pjsip-apps\build\swig_csharp_pjsua2.vcxproj `
              /p:PlatformToolset=v143 `
              /p:Configuration=Release `
              /p:Platform=x64 `
              /p:WindowsTargetPlatformVersion="$($env:WindowsSDKVersion.TrimEnd('\'))" `
              /p:AdditionalOptions="/bigobj" `
              /p:UseEnv=true
      
      - name: Setup .NET 10.0.x
        if: steps.cache-libs.outputs.cache-hit != 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore Dependencies
        if: steps.cache-libs.outputs.cache-hit != 'true'
        working-directory: src/libpjsua2maui.win
        run: | 
          dotnet workload install maui --source https://api.nuget.org/v3/index.json --skip-manifest-update
          dotnet workload install windows --source https://api.nuget.org/v3/index.json --skip-manifest-update
          dotnet workload update
          dotnet workload restore libpjsua2maui.win.csproj
          dotnet restore libpjsua2maui.win.csproj

      - name: Build win managed dll     
        working-directory: src/libpjsua2maui.win
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          dotnet publish libpjsua2maui.win.csproj -c Release --no-restore
   
      - name: Collect PJSIP artifacts
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src/libpjsua2.win.dll/lib/x64" | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/src/libpjsua2maui.win/pjsua2maui/pjsua2" | Out-Null
          if (Test-Path "pjproject/pjsip-apps/src/swig/output") {
            Copy-Item pjproject/pjsip-apps/src/swig/csharp/output/*.cs ${{ github.workspace }}/src/libpjsua2maui.win/pjsua2maui/pjsua2 -ErrorAction SilentlyContinue
            Copy-Item pjproject/pjsip-apps/src/swig/output/*.dll src/libpjsua2.win.dll/lib/x64 -Recurse -Force
          }
          
          Get-ChildItem .\src\libpjsua2maui.win\bin\ -Recurse
          Get-ChildItem .\src\libpjsua2.win.dll\ -Recurse

      - name: Build Managed Library
        if: steps.cache-libs.outputs.cache-hit != 'true'
        working-directory: src/libpjsua2maui.win
        run: | 
          dotnet publish libpjsua2maui.win.csproj -c Release --no-restore 

      - name: Upload PJSIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pjsip-win-x64
          path: |
            src/libpjsua2.win.dll/**/*
            src/libpjsua2maui.win/**/*
          if-no-files-found: warn

  nupkg:
    runs-on: macos-26
    name: libpjsua2.nupkg 
    needs: [pjsip-android, pjsip-ios, pjsip-mac, pjsip-win]
    steps: 
      - name: Checkout
        uses: actions/checkout@v6
    
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          
      - name: Setup nuget 
        run: brew install nuget
 
      - uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '17'
          
      - name: Download Android x86 Artifact
        uses: actions/download-artifact@v8
        with:
          name: pjsip-android-x86
          path: ./artifacts/android-x86
      
      - name: Download Android x86_64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: pjsip-android-x86_64
          path: ./artifacts/android-x86_64
          
      - name: Download Android arm Artifact
        uses: actions/download-artifact@v8
        with:
          name: pjsip-android-armeabi-v7a
          path: ./artifacts/android-armeabi-v7a
      
      - name: Download Android arm64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: pjsip-android-arm64-v8a
          path: ./artifacts/android-arm64-v8a
  
      - name: Download ios Artifacts
        uses: actions/download-artifact@v8
        with:
          name: pjsip-x86_64
          path: ./artifacts/ios/pjsip-x86_64
      
      - name: Download ios arm64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: pjsip-arm64
          path: ./artifacts/ios/pjsip-arm64

      - name: Download ios arm64s Artifact
        uses: actions/download-artifact@v8
        with:
          name: pjsip-arm64s
          path: ./artifacts/ios/pjsip-arm64s

      - uses: actions/download-artifact@v8
        name: Download pjsip macos (arm64)
        with:
          name: pjsip-${{env.PJSIP_VERSION}}-MacOSX${{ env.SDKVERSION }}-arm64.sdk
          path: ${{ env.PJ_PATH }}
        env:
          PJ_PATH: ${{ github.workspace }}/pjsip-${{env.PJSIP_VERSION}}-MacOSX${{ env.SDKVERSION }}.sdk/arm64

      - uses: actions/download-artifact@v8
        name: Download pjsip macos (x64)
        with:
          name: pjsip-${{env.PJSIP_VERSION}}-MacOSX${{ env.SDKVERSION }}-x86_64.sdk
          path: ${{ env.PJ_PATH }}
        env:
          PJ_PATH: ${{ github.workspace }}/pjsip-${{env.PJSIP_VERSION}}-MacOSX${{ env.SDKVERSION }}.sdk/x86_64

      - name: Download win x64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: pjsip-win-x64
          path: ./artifacts/win/pjsip-x64
      
      - name: Prepare Dirs
        run: |
          mkdir -p ${{ github.workspace }}/src/libpjsua2.android.so/org/pjsip
          mkdir -p ${{ github.workspace }}/src/libpjsua2maui.android/pjsua2maui/pjsua2
          mkdir -p ${{ github.workspace }}/src/libpjsua2maui.ios/pjsua2maui/pjsua2
          mkdir -p ${{ github.workspace }}/src/libpjsua2maui.mac/pjsua2maui/pjsua2
          mkdir -p ${{ github.workspace }}/src/libpjsua2maui.win/bin
          mkdir -p ${{ github.workspace }}/src/libpjsua2.android.so/lib/x86
          mkdir -p ${{ github.workspace }}/src/libpjsua2.android.so/lib/x86_64
          mkdir -p ${{ github.workspace }}/src/libpjsua2.android.so/lib/armeabi-v7a
          mkdir -p ${{ github.workspace }}/src/libpjsua2.android.so/lib/arm64-v8a
          mkdir -p ${{ github.workspace }}/src/libpjsua2.android.so/lib/org/pjsip
          mkdir -p ${{ github.workspace }}/src/libpjsua2.ios.a/lib/arm64
          mkdir -p ${{ github.workspace }}/src/libpjsua2.ios.a/lib/arm64s
          mkdir -p ${{ github.workspace }}/src/libpjsua2.ios.a/lib/x86_64
          mkdir -p ${{ github.workspace }}/src/libpjsua2.mac.a/lib/arm64
          mkdir -p ${{ github.workspace }}/src/libpjsua2.mac.a/lib/x86_64
          mkdir -p ${{ github.workspace }}/src/libpjsua2.win.dll/lib/x64
 
          # Move managed classes to projects directory
          mv ${{ github.workspace }}/artifacts/android-arm64-v8a/java/org/pjsip/*.java ${{ github.workspace }}/src/libpjsua2.android.so/org/pjsip/
          mv ${{ github.workspace }}/artifacts/android-arm64-v8a/csharp/pjsua2/* ${{ github.workspace }}/src/libpjsua2maui.android/pjsua2maui/pjsua2
          mv ${{ github.workspace }}/artifacts/ios/pjsip-arm64/cs/* ${{ github.workspace }}/src/libpjsua2maui.ios/pjsua2maui/pjsua2
          mv ${{ github.workspace }}/artifacts/mac/pjsip-arm64/cs/* ${{ github.workspace }}/src/libpjsua2maui.mac/pjsua2maui/pjsua2
          
          # Move managed assemblies to projects directory
          mv -v ${{ github.workspace }}/artifacts/win/pjsip-x64/bin ${{ github.workspace }}/src/libpjsua2maui.win/bin

          # Move android libs to packaging directory
          mv ${{ github.workspace }}/artifacts/android-x86/*.so ${{ github.workspace }}/src/libpjsua2.android.so/lib/x86
          mv ${{ github.workspace }}/artifacts/android-x86_64/*.so ${{ github.workspace }}/src/libpjsua2.android.so/lib/x86_64
          mv ${{ github.workspace }}/artifacts/android-armeabi-v7a/*.so ${{ github.workspace }}/src/libpjsua2.android.so/lib/armeabi-v7a
          mv ${{ github.workspace }}/artifacts/android-arm64-v8a/*.so ${{ github.workspace }}/src/libpjsua2.android.so/lib/arm64-v8a
          
          # Move ios libs to packaging directory
          mv ${{ github.workspace }}/artifacts/ios/pjsip-x86_64/lib/* ${{ github.workspace }}/src/libpjsua2.ios.a/lib/x86_64
          mv ${{ github.workspace }}/artifacts/ios/pjsip-arm64s/lib/* ${{ github.workspace }}/src/libpjsua2.ios.a/lib/arm64s
          mv ${{ github.workspace }}/artifacts/ios/pjsip-arm64/lib/* ${{ github.workspace }}/src/libpjsua2.ios.a/lib/arm64
          
          # Move mac libs to packaging directory
          mv ${{ github.workspace }}/artifacts/mac/pjsip-arm64/lib/* ${{ github.workspace }}/src/libpjsua2.mac.a/lib/arm64
          mv ${{ github.workspace }}/artifacts/mac/pjsip-x86_64/lib/* ${{ github.workspace }}/src/libpjsua2.mac.a/lib/x86_64
          
          # Move win libs to packaging directory
          mv -v ${{ github.workspace }}/artifacts/win/pjsip-x64/lib/x64/*.dll ${{ github.workspace }}/src/libpjsua2.win.dll/lib/x64 

          cd  ${{ github.workspace }}/src/libpjsua2.ios.a/lib/x86_64
          mkdir tmp
          mv *.a tmp
          libtool -static -o libpjsua2.a ./tmp/*.a 
          rm -rf tmp
          cd ${{ github.workspace }}/src/libpjsua2.ios.a/lib/arm64s
          mkdir tmp
          mv *.a tmp
          libtool -static -o libpjsua2.a ./tmp/*.a 
          rm -rf tmp
        env:
          BUILT_OUTPUT_PATH: ${{ github.workspace }}/pjsip-${{env.PJSIP_VERSION}}-MacOSX${{ env.SDKVERSION }}.sdk         
      
      - name: Restore Dependencies
        working-directory: src
        run: | 
          echo "⏳ Cleaning old workloads..."
          dotnet workload uninstall maui --ignore-failed-sources || true
          dotnet workload uninstall android --ignore-failed-sources || true
          dotnet workload uninstall ios --ignore-failed-sources || true
          dotnet workload uninstall maccatalyst --ignore-failed-sources || true

          echo "⏳ Installing workloads MAUI 10..."
          dotnet workload install maui --source https://api.nuget.org/v3/index.json --skip-manifest-update
          dotnet workload install android --source https://api.nuget.org/v3/index.json --skip-manifest-update
          dotnet workload install ios --source https://api.nuget.org/v3/index.json --skip-manifest-update
          dotnet workload install maccatalyst --source https://api.nuget.org/v3/index.json --skip-manifest-update

          echo "⏳ Updating all workloads..."
          dotnet workload update
          dotnet workload restore $(find . -name "*.slnx" | head -n 1)
          dotnet restore libpjsua2maui.android/libpjsua2maui.android.csproj
          dotnet restore libpjsua2maui.ios/libpjsua2maui.ios.csproj
          dotnet restore libpjsua2maui.mac/libpjsua2maui.mac.csproj

      - name: Build MAUI Android
        run: dotnet publish src/libpjsua2maui.android/libpjsua2maui.android.csproj -c Release -f net10.0-android --no-restore
        
      - name: Build MAUI iOS
        run: dotnet publish src/libpjsua2maui.ios/libpjsua2maui.ios.csproj -c Release -f net10.0-ios --no-restore
      
      - name: Build MAUI MacOSX
        run: dotnet publish src/libpjsua2maui.mac/libpjsua2maui.mac.csproj -c Release -f net10.0-maccatalyst --no-restore
      
      - name: Set VERSION variable
        run: |
          NUSPEC_PATH="${{ github.workspace }}/src/libpjsua2maui.nuspec"
          
          VERSION=$(xmllint --xpath "//*[local-name()='version']/text()" "$NUSPEC_PATH" 2>/dev/null | xargs)
          
          if [ -n "$VERSION" ]; then
            echo "Found version: $VERSION"
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "Error: Tag <version> not found at .nuspec file"
            exit 1
          fi

      - name: Validate and Pack NuGet 
        working-directory: ${{ github.workspace }}/src
        run: |
          
          nuget pack libpjsua2maui.nuspec \
            -Version "${{ env.VERSION }}" \
            -BasePath "${{ github.workspace }}/src" \
            -NoPackageAnalysis \
            -NoDefaultExcludes \
            -Verbosity detailed 

        env: 
          VERSION: ${{ env.VERSION }}

      - name: Upload nuget artifacts
        uses: actions/upload-artifact@v7
        with:
          name: libpjsua2maui.${{ env.VERSION }}.nupkg
          path: ${{ github.workspace }}/src/*.nupkg
          overwrite: true
        env: 
          VERSION: ${{ env.VERSION }}

      - name: Push to nuget.org
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd ${{ github.workspace }}/src
          dotnet nuget push libpjsua2maui.${{ env.VERSION }}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${API_KEY} --skip-duplicate
        env:
          API_KEY: ${{ secrets.API_KEY }}
          VERSION: ${{ env.VERSION }}

      - name: Push to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd ${{ github.workspace }}/src/
          dotnet nuget push libpjsua2maui.${{ env.VERSION }}.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${NUGET_TOKEN}" --skip-duplicate
        env:
          NUGET_TOKEN: ${{ secrets.GH_TOKEN }}
          VERSION: ${{ env.VERSION }}
